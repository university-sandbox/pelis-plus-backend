spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: pelis-plus-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/pelisplus_db}
    username: ${DB_USERNAME:pelisplus_user}
    password: ${DB_PASSWORD:pelisplus_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: false

server:
  servlet:
    context-path: /api
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework

app:
  tmdb:
    enabled: ${TMDB_SYNC_ENABLED:true}
    base-url: ${TMDB_BASE_URL:https://api.themoviedb.org/3}
    access-token: ${TMDB_ACCESS_TOKEN:}
    api-key: ${TMDB_API_KEY:}
    language: ${TMDB_LANGUAGE:es-PE}
    region: ${TMDB_REGION:PE}
    max-pages-per-list: ${TMDB_MAX_PAGES_PER_LIST:3}
    release-lookback-days: ${TMDB_RELEASE_LOOKBACK_DAYS:7}
    max-release-lookback-days: ${TMDB_MAX_RELEASE_LOOKBACK_DAYS:21}
    sync-cron: ${TMDB_SYNC_CRON:0 0 23 * * SUN}
    time-zone: ${TMDB_TIME_ZONE:America/Lima}
  payments:
    stripe:
      secret-key: ${STRIPE_SECRET_KEY:}
      currency: ${STRIPE_CURRENCY:pen}
      success-url: ${STRIPE_SUCCESS_URL:http://localhost:4200/checkout/stripe/success?order_id={ORDER_ID}&session_id={CHECKOUT_SESSION_ID}}
      cancel-url: ${STRIPE_CANCEL_URL:http://localhost:4200/checkout?payment=cancelled}
      membership-success-url: ${STRIPE_MEMBERSHIP_SUCCESS_URL:http://localhost:4200/memberships/stripe/success?session_id={CHECKOUT_SESSION_ID}}
      membership-cancel-url: ${STRIPE_MEMBERSHIP_CANCEL_URL:http://localhost:4200/memberships?payment=cancelled}
  security:
    jwt:
      secret: ${JWT_SECRET:VGhpc0lzQVNlY3VyZUFuZExvbmdCYXNlNjRTZWNyZXRLZXlGb3JKV1Q=}
      expiration-minutes: ${JWT_EXPIRATION_MINUTES:216000}
      issuer: ${JWT_ISSUER:pelis-plus}
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200}

springdoc:
  api-docs:
    enabled: ${SWAGGER_ENABLED:true}
    path: /v3/api-docs
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:true}
    path: ${SWAGGER_UI_PATH:/swagger-ui.html}
