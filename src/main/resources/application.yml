spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: pelis-plus-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/pelisplus_db}
    username: ${DB_USERNAME:pelisplus_user}
    password: ${DB_PASSWORD:pelisplus_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: false

server:
  servlet:
    context-path: /api
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework

app:
  security:
    jwt:
      secret: ${JWT_SECRET:VGhpc0lzQVNlY3VyZUFuZExvbmdCYXNlNjRTZWNyZXRLZXlGb3JKV1Q=}
      expiration-minutes: ${JWT_EXPIRATION_MINUTES:60}
      issuer: ${JWT_ISSUER:pelis-plus}
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://127.0.0.1:4200}

springdoc:
  api-docs:
    enabled: ${SWAGGER_ENABLED:true}
    path: /v3/api-docs
  swagger-ui:
    enabled: ${SWAGGER_ENABLED:true}
    path: ${SWAGGER_UI_PATH:/swagger-ui.html}
